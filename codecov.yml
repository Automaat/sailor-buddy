coverage:
  status:
    project:
      backend:
        target: 80%
        flags:
          - backend
      frontend:
        target: 0%
        flags:
          - frontend
    patch:
      backend:
        target: 80%
        flags:
          - backend
      frontend:
        target: 0%
        flags:
          - frontend

ignore:
  - "backend/internal/db/sqlcdb/**"
  - "backend/cmd/**"
  - "backend/internal/db/db.go"
  - "backend/internal/auth/firebase.go"
  - "backend/internal/api/router.go"
  - "backend/internal/api/middleware/auth.go"
  - "backend/internal/docgen/pdf.go"

flags:
  backend:
    paths:
      - backend/
  frontend:
    paths:
      - frontend/
