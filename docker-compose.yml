services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: sailor
      POSTGRES_PASSWORD: sailor
      POSTGRES_DB: sailor
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sailor"]
      interval: 2s
      timeout: 5s
      retries: 10

  firebase-emulator:
    build:
      context: .
      dockerfile: firebase-emulator.Dockerfile
    ports:
      - "127.0.0.1:9099:9099"
      - "127.0.0.1:4000:4000"
    volumes:
      - firebase-data:/opt/firebase/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - SAILOR_DATABASE_URL=postgres://sailor:sailor@postgres:5432/sailor?sslmode=disable
      - SAILOR_FIREBASE_PROJECT_ID=sailor-buddy-dev
      - SAILOR_LISTEN_ADDR=:8080
      - FIREBASE_AUTH_EMULATOR_HOST=firebase-emulator:9099
    depends_on:
      postgres:
        condition: service_healthy
      firebase-emulator:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
    environment:
      - PUBLIC_API_URL=http://localhost:8081/api
      - VITE_BACKEND_URL=http://backend:8080
      - VITE_FIREBASE_AUTH_EMULATOR_URL=http://localhost:9099
      - VITE_FIREBASE_PROJECT_ID=sailor-buddy-dev

volumes:
  postgres-data:
  firebase-data:
