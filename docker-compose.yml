services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - backend-data:/app/data
    environment:
      - SAILOR_DB_PATH=/app/data/sailor.db
      - SAILOR_FIREBASE_PROJECT_ID=sailor-buddy-dev
      - SAILOR_LISTEN_ADDR=:8080
      - FIREBASE_AUTH_EMULATOR_HOST=host.docker.internal:9099

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
    environment:
      - PUBLIC_API_URL=http://localhost:8081/api
      - VITE_BACKEND_URL=http://backend:8080

volumes:
  backend-data:
