services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - backend-data:/app/data
    environment:
      - SAILOR_DB_PATH=/app/data/sailor.db
      - SAILOR_JWT_SECRET=change-me-in-production
      - SAILOR_LISTEN_ADDR=:8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/static:/app/static
    environment:
      - PUBLIC_API_URL=http://localhost:8081/api

volumes:
  backend-data:
