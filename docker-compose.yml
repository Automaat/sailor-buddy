services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    environment:
      - SAILOR_DB_PATH=/app/data/sailor.db
      - SAILOR_JWT_SECRET=change-me-in-production
      - SAILOR_LISTEN_ADDR=:8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - PUBLIC_API_URL=http://localhost:8080/api/v1

volumes:
  backend-data:
