[tools]
go = "1.26.1"
node = "24"
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "v1.30.0"
"go:github.com/air-verse/air" = "v1.64.5"
"npm:firebase-tools" = "15.9.0"

[tasks.dev]
description = "Start full stack via docker-compose"
run = "docker compose up --build"

[tasks.dev-backend]
description = "Run backend with hot reload (needs: mise run dev-emulator)"
run = "cd backend && SAILOR_DATABASE_URL=postgres://sailor:sailor@localhost:5432/sailor?sslmode=disable FIREBASE_AUTH_EMULATOR_HOST=localhost:9099 air"

[tasks.dev-frontend]
description = "Run frontend dev server"
run = "cd frontend && npm run dev"

[tasks.dev-emulator]
description = "Start Firebase emulator in Docker"
run = "docker compose up --build firebase-emulator"

[tasks.migrate]
description = "Run database migrations"
run = "cd backend && go run cmd/migrate/main.go"

[tasks.sqlc]
description = "Generate sqlc code"
run = "cd backend && sqlc generate"

[tasks.test]
description = "Run all tests"
run = "cd backend && go test ./..."
